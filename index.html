<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Rummy Master</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rummy Master">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/8024/8024460.png">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBKzv5R78MFRzG4bCLB_flI8tbP29ia5AQ",
            authDomain: "rummy-34a88.firebaseapp.com",
            databaseURL: "https://rummy-34a88-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rummy-34a88",
            storageBucket: "rummy-34a88.firebasestorage.app",
            messagingSenderId: "1026979501644",
            appId: "1:1026979501644:web:a59ba0c59fb04c26b3c6e9"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref; window.set = set; window.onValue = onValue; window.get = get;

        // Register Service Worker for PWA
        if ('service-worker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 30px; }
        .container { max-width: 500px; margin: auto; }
        #loginScreen { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; margin-top: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .setup-row { display: flex; gap: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: var(--card); padding: 12px; border-radius: 8px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; font-size: 14px; }
        input, select { background: #334155; color: white; border: 1px solid #475569; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .section { background: var(--card); padding: 15px; border-radius: 10px; margin-top: 15px; font-size: 13px; border-left: 4px solid var(--primary); }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 11px; text-transform: uppercase; }
        .history-item { border-bottom: 1px solid #334155; padding: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen">
        <img src="https://cdn-icons-png.flaticon.com/512/8024/8024460.png" width="80" style="margin-bottom: 10px;">
        <h2 style="margin:0; color: var(--primary);">Rummy Master</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Enter Nickname & PIN to Sync</p>
        <input type="text" id="nickname" placeholder="Nickname" style="margin-bottom:12px;">
        <input type="password" id="pin" placeholder="PIN" style="margin-bottom:20px;">
        <button onclick="loginUser()" style="background:var(--primary); width:100%;">ENTER GAME</button>
    </div>

    <div id="gameContent" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="userTitle" style="margin: 10px 0;">Rummy Master</h2>
            <button onclick="logout()" style="background:var(--danger); padding: 5px 12px; font-size: 12px;">Logout</button>
        </div>

        <div class="setup-row">
            <div><label>Point Limit</label>
                <select id="pointLimit" onchange="saveData()">
                    <option value="101">101 Points</option>
                    <option value="201">201 Points</option>
                </select>
            </div>
            <div><label>Entry Fee (₹)</label>
                <input id="matchAmount" type="number" value="50" onchange="saveData()">
            </div>
        </div>

        <table id="playerTable"></table>

        <div class="btn-row">
            <button onclick="addRound()" style="background:var(--success)">Add Round</button>
            <button onclick="undoRound()" style="background:var(--warning)">Undo Last</button>
            <button onclick="addPlayer()" style="background:#64748b">+ Player</button>
            <button onclick="completeMatch()" style="background:var(--primary)">Complete Match</button>
        </div>

        <div class="section">
            <b>💰 RECORD PAYOUT</b>
            <div style="margin-top:10px;">
                <label>Who Won?</label>
                <select id="winnerSelect"></select>
                <label style="margin-top:10px;">Who is Paying?</label>
                <div id="payerList" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;"></div>
                <button onclick="addPayout()" style="background:var(--primary); width:100%;">SAVE PAYOUT</button>
            </div>
            <div id="payoutsDisplay" style="margin-top:10px; color:#cbd5e1;"></div>
        </div>

        <div class="section"><b>📜 ROUND HISTORY</b><div id="history" style="margin-top:5px; line-height:1.6;"></div></div>
        <div class="section"><b>🏆 ARCHIVE</b><div id="archive" style="margin-top:5px;"></div></div>
    </div>
</div>

<script>
    let players = [], rounds = [], payouts = [], archive = [], currentUser = "";

    // Load session on start
    window.addEventListener('load', () => {
        const savedNick = localStorage.getItem("rummy_nick");
        const savedPin = localStorage.getItem("rummy_pin");
        if (savedNick && savedPin) {
            document.getElementById("nickname").value = savedNick;
            document.getElementById("pin").value = savedPin;
            loginUser(true);
        }
    });

    async function loginUser(isAuto = false) {
        const nick = document.getElementById("nickname").value.trim();
        const pin = document.getElementById("pin").value.trim();
        if(!nick || !pin) return alert("Enter credentials");

        const userRef = window.ref(window.db, 'users/' + nick);
        const snapshot = await window.get(userRef);

        if (!snapshot.exists()) {
            if(isAuto) return;
            if(!confirm("User not found. Create new account?")) return;
            await window.set(userRef, { pin, players: [], rounds: [], payouts: [], archive: [], limit: 101, amount: 50 });
        } else if (snapshot.val().pin !== pin) {
            if(isAuto) return;
            return alert("Incorrect PIN!");
        }

        // Persistent Login
        localStorage.setItem("rummy_nick", nick);
        localStorage.setItem("rummy_pin", pin);
        
        currentUser = nick;
        window.dbRef = userRef;
        document.getElementById("userTitle").innerText = "Master: " + nick;
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("gameContent").style.display = "block";

        window.onValue(window.dbRef, (snap) => {
            const data = snap.val();
            if(!data) return;
            players = data.players || []; rounds = data.rounds || []; 
            payouts = data.payouts || []; archive = data.archive || [];
            document.getElementById('pointLimit').value = data.limit || 101;
            document.getElementById('matchAmount').value = data.amount || 50;
            renderTable();
        });
    }

    function renderTable() {
        const limit = parseInt(document.getElementById("pointLimit").value);
        const sorted = [...players].sort((a, b) => a.total - b.total);
        
        document.getElementById('playerTable').innerHTML = sorted.map(p => {
            const isOut = p.total >= limit;
            return `<tr>
                <td style="width:30px"><button onclick="removePlayer(${p.id})" style="background:none; color:var(--danger); font-size:20px;">×</button></td>
                <td><input value="${p.name}" onchange="updateName(${p.id}, this.value)" style="border:none; background:transparent; font-weight:bold; color:white;"></td>
                <td style="width:70px"><input id="s${p.id}" type="number" ${isOut ? 'disabled placeholder="OUT"' : 'placeholder="Pts"'} style="text-align:center;"></td>
                <td style="text-align:right; font-weight:bold; color:${isOut? 'var(--danger)' : 'var(--success)'}">${p.total}${isOut?'❌':''}</td>
            </tr>`;
        }).join('');

        document.getElementById("winnerSelect").innerHTML = players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
        document.getElementById("payerList").innerHTML = players.map(p => `<label style="background:#334155; padding:5px 10px; border-radius:15px; display:inline-block; margin-right:5px;"><input type="checkbox" name="p" value="${p.name}"> ${p.name}</label>`).join('');
        document.getElementById("history").innerHTML = rounds.map((r, i) => `<b>R${i+1}:</b> ${Object.entries(r).map(([id,pts]) => (players.find(pl=>pl.id==id)?.name || "User") + "("+pts+")").join(', ')}`).reverse().join('<br>');
        document.getElementById("payoutsDisplay").innerHTML = payouts.map(p => `<div>✅ ${p.w} got ₹${p.amt} from ${p.f}</div>`).join('');
        document.getElementById("archive").innerHTML = archive.map(a => `<div class="history-item">${a}</div>`).reverse().join('');
    }

    function addPlayer() {
        const n = prompt("Player Name:");
        if(n) { players.push({id: Date.now(), name: n, total: 0}); saveData(); }
    }

    function removePlayer(id) { if(confirm("Delete player?")) { players = players.filter(p => p.id !== id); saveData(); } }
    function updateName(id, val) { const p = players.find(p => p.id === id); if(p) p.name = val; saveData(); }

    function addRound() {
        const limit = parseInt(document.getElementById('pointLimit').value);
        let r = {}; players.forEach(p => {
            const input = document.getElementById(`s${p.id}`);
            const val = parseInt(input.value) || 0;
            if (p.total < limit) p.total += val;
            r[p.id] = val; input.value = "";
        });
        rounds.push(r); saveData();
    }

    function undoRound() {
        if(rounds.length > 0 && confirm("Undo last round?")) {
            const r = rounds.pop();
            players.forEach(p => { if(r[p.id]) p.total -= r[p.id]; });
            saveData();
        }
    }

    function addPayout() {
        const w = document.getElementById("winnerSelect").value;
        const payers = Array.from(document.querySelectorAll('input[name="p"]:checked')).map(c => c.value);
        const amt = payers.length * parseInt(document.getElementById("matchAmount").value);
        if(!w || payers.length === 0) return alert("Select winner and payers");
        payouts.push({ w, amt, f: payers.join(', ') });
        saveData();
    }

    function completeMatch() {
        if(!confirm("Reset scores and archive?")) return;
        const winNames = players.filter(p => p.total < parseInt(document.getElementById('pointLimit').value)).map(p => p.name).join(', ');
        archive.push(`${new Date().toLocaleDateString()} | 🏆 ${winNames} | ₹${payouts.length * parseInt(document.getElementById('matchAmount').value)}`);
        rounds = []; payouts = []; players.forEach(p => p.total = 0);
        saveData();
    }

    function logout() {
        if(confirm("Logout?")) { localStorage.clear(); location.reload(); }
    }

    function saveData() {
        if(!window.dbRef) return;
        window.set(window.dbRef, { 
            pin: document.getElementById("pin").value, 
            players, rounds, payouts, archive, 
            limit: document.getElementById('pointLimit').value, 
            amount: document.getElementById('matchAmount').value 
        });
    }
</script>
</body>
</html>
