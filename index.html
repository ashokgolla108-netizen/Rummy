<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Rummy Master Pro</title>
    <link rel="manifest" href="manifest.json">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBKzv5R78MFRzG4bCLB_flI8tbP29ia5AQ",
            authDomain: "rummy-34a88.firebaseapp.com",
            databaseURL: "https://rummy-34a88-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rummy-34a88",
            storageBucket: "rummy-34a88.firebasestorage.app",
            appId: "1:1026979501644:web:a59ba0c59fb04c26b3c6e9"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.ref = ref; window.set = set; window.onValue = onValue; window.get = get;
        if ('service-worker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
    <style>
        :root { --bg: #020617; --glass: rgba(30, 41, 59, 0.7); --primary: #38bdf8; --accent: #818cf8; --success: #4ade80; --danger: #f87171; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #020617); color: var(--text); margin: 0; padding: 15px; min-height: 100vh; }
        .container { max-width: 450px; margin: auto; }
        .card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-weight: 800; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 20px 0; }
        input, select { background: rgba(15, 23, 42, 0.8); color: white; border: 1px solid #334155; padding: 12px; border-radius: 12px; width: 100%; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        button { border-radius: 12px; border: none; padding: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .player-row { display: flex; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid transparent; }
        .player-row.leader { border-left-color: var(--success); background: rgba(74, 222, 128, 0.08); }
        .player-row.out { opacity: 0.3; border-left-color: var(--danger); }
        .player-name { flex: 1; font-weight: 600; }
        .player-score { font-size: 20px; font-weight: 900; width: 50px; text-align: right; color: var(--primary); }
        .pts-input { width: 70px; margin: 0 10px; text-align: center; background: #0f172a; border-color: var(--accent); }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chip { background: rgba(255,255,255,0.05); padding: 8px 14px; border-radius: 20px; font-size: 12px; display: inline-block; margin: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .chip.active { background: var(--primary); color: #020617; font-weight: bold; }
        .scroll-area { max-height: 250px; overflow-y: auto; font-size: 11px; line-height: 1.8; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="card" style="margin-top: 80px; text-align: center;">
        <h2>RUMMY MASTER</h2>
        <input type="text" id="nickname" placeholder="Username">
        <input type="password" id="pin" placeholder="PIN">
        <button onclick="loginUser()" class="btn-primary" style="width: 100%;">Connect</button>
    </div>

    <div id="gameContent" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="userTitle">Lobby</h2>
            <button onclick="logout()" class="btn-ghost" style="padding:6px 12px; font-size:11px; color:var(--danger);">LOGOUT</button>
        </div>

        <div class="card" style="padding: 15px;">
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label style="font-size:10px; color:#94a3b8;">LIMIT</label>
                    <select id="pointLimit" onchange="saveData()"><option value="101">101 Pts</option><option value="201">201 Pts</option></select>
                </div>
                <div style="flex:1"><label style="font-size:10px; color:#94a3b8;">ENTRY (₹)</label>
                    <input id="matchAmount" type="number" value="50" onchange="saveData()">
                </div>
            </div>
        </div>

        <div id="playerList"></div>

        <div class="action-grid">
            <button onclick="addRound()" class="btn-primary" style="grid-column: span 2; background: var(--success); color:#064e3b;">Post Round</button>
            <button onclick="addPlayer()" class="btn-ghost">+ Player</button>
            <button onclick="undoRound()" class="btn-ghost" style="color:var(--danger);">Undo</button>
            <button onclick="completeMatch()" class="btn-primary" style="grid-column: span 2; margin-top:10px; background:var(--accent);">Archive Match</button>
        </div>

        <div class="card" style="margin-top:20px;">
            <h4 style="margin:0 0 10px 0; color:var(--accent);">📑 ROUND HISTORY</h4>
            <div id="roundHistory" class="scroll-area"></div>
        </div>

        <div class="card" style="margin-top:5px;">
            <h4 style="margin:0 0 15px 0; color:var(--primary);">💰 PAYOUT CALCULATOR</h4>
            <select id="winnerSelect" onchange="calcPot()"></select>
            <div id="payerChips" style="margin-bottom:10px;"></div>
            <div id="potDisplay" style="background:rgba(74,222,128,0.1); padding:12px; border-radius:12px; font-weight:900; text-align:center; color:var(--success); margin-bottom:10px;">Pot: ₹0</div>
            <button onclick="addPayout()" class="btn-primary" style="width:100%; font-size:13px;">Save Payout</button>
            <div id="payoutHistory" style="margin-top:15px; font-size:11px; opacity:0.7;"></div>
        </div>

        <div class="card">
            <h4 style="margin:0 0 10px 0; color:#64748b;">📅 DAYWISE HISTORY</h4>
            <div id="archive" class="scroll-area"></div>
            <button onclick="if(confirm('Clear all history?')) { archive=[]; saveData(); }" style="background:none; color:var(--danger); font-size:10px; padding:0; margin-top:15px; width:100%; text-align:center;">Clear Archive</button>
        </div>
    </div>
</div>

<script>
    let players=[], rounds=[], payouts=[], archive=[], currentUser="", selectedPayers=[];

    window.addEventListener('load', () => {
        const n=localStorage.getItem("rummy_nick"), p=localStorage.getItem("rummy_pin");
        if(n && p) { document.getElementById("nickname").value=n; document.getElementById("pin").value=p; loginUser(true); }
    });

    async function loginUser(auto=false) {
        const nick=document.getElementById("nickname").value.trim(), pin=document.getElementById("pin").value.trim();
        if(!nick || !pin) return;
        const ref=window.ref(window.db, 'users/'+nick), snap=await window.get(ref);
        if(!snap.exists()) {
            if(auto) return;
            if(confirm("Create account?")) await window.set(ref, {pin, players:[], rounds:[], payouts:[], archive:[], limit:101, amount:50}); else return;
        } else if(snap.val().pin!==pin) { if(auto) return; return alert("Wrong PIN"); }
        localStorage.setItem("rummy_nick", nick); localStorage.setItem("rummy_pin", pin);
        currentUser=nick; window.dbRef=ref;
        document.getElementById("loginScreen").style.display="none";
        document.getElementById("gameContent").style.display="block";
        document.getElementById("userTitle").innerText=nick.toUpperCase();
        window.onValue(window.dbRef, s => {
            const d=s.val(); if(!d) return;
            players=d.players||[]; rounds=d.rounds||[]; payouts=d.payouts||[]; archive=d.archive||[];
            document.getElementById('pointLimit').value=d.limit||101; document.getElementById('matchAmount').value=d.amount||50;
            render();
        });
    }

    function render() {
        const lim=parseInt(document.getElementById("pointLimit").value);
        const sorted=[...players].sort((a,b)=>a.total-b.total);
        document.getElementById('playerList').innerHTML = sorted.map((p,idx) => {
            const isOut=p.total>=lim;
            return `<div class="player-row ${idx===0 && !isOut?'leader':''} ${isOut?'out':''}">
                <div onclick="removePlayer(${p.id})" style="color:var(--danger); cursor:pointer; font-weight:bold; margin-right:12px;">×</div>
                <div class="player-name">${p.name}</div>
                <input id="s${p.id}" type="number" class="pts-input" ${isOut?'disabled placeholder="OUT"':'placeholder="+"'}>
                <div class="player-score">${p.total}</div>
            </div>`;
        }).join('');

        document.getElementById("winnerSelect").innerHTML = players.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
        document.getElementById("payerChips").innerHTML = players.map(p=>`<div class="chip ${selectedPayers.includes(p.name)?'active':''}" onclick="togglePayer('${p.name}')">${p.name}</div>`).join('');
        document.getElementById("payoutHistory").innerHTML = payouts.map(p=>`<div>💸 ${p.w} collected ₹${p.amt} from ${p.f}</div>`).reverse().join('');
        
        // Round History rendering
        document.getElementById("roundHistory").innerHTML = rounds.length === 0 ? "No rounds played yet." : 
            rounds.map((rd, i) => {
                const roundDetails = Object.entries(rd).map(([id, pts]) => {
                    const pName = players.find(p => p.id == id)?.name || "P";
                    return `${pName}: ${pts}`;
                }).join(', ');
                return `<div style="border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0;"><b>R${i+1}:</b> ${roundDetails}</div>`;
            }).reverse().join('');

        // FIXED DAYWISE ARCHIVE CALCULATION
        const grouped = archive.reduce((acc, m) => {
            const d = m.date || "Unknown Date";
            if(!acc[d]) acc[d]=[]; acc[d].push(m); return acc;
        }, {});
        
        const archiveHTML = Object.keys(grouped).reverse().map(date => `
            <div style="margin-top:10px;">
                <div style="color:var(--primary); font-weight:bold; border-bottom:1px solid #334155; padding-bottom:3px; margin-bottom:8px;">${date}</div>
                ${grouped[date].reverse().map(m => `
                    <div style="margin-bottom:8px; padding:8px; background:rgba(255,255,255,0.03); border-radius:8px;">
                        <div style="display:flex; justify-content:space-between; font-size:10px; color:#94a3b8; margin-bottom:3px;">
                            <span>${m.time || ''}</span> <span style="color:var(--success)">🏆 ${m.winners}</span>
                        </div>
                        <div style="font-size:11px; opacity:0.8;">${m.summary}</div>
                    </div>
                `).join('')}
            </div>
        `).join('');
        
        document.getElementById("archive").innerHTML = archiveHTML || "No matches archived yet.";
        calcPot();
    }

    function togglePayer(name) {
        if(selectedPayers.includes(name)) selectedPayers=selectedPayers.filter(n=>n!==name);
        else selectedPayers.push(name); render();
    }
    function calcPot() { const amt=selectedPayers.length*parseInt(document.getElementById("matchAmount").value); document.getElementById("potDisplay").innerText=`Pot: ₹${amt}`; }
    
    function addRound() {
        const lim=parseInt(document.getElementById('pointLimit').value);
        let rd={}; 
        let added = false;
        players.forEach(p=>{
            const val=parseInt(document.getElementById(`s${p.id}`).value)||0;
            if(p.total<lim) { p.total+=val; rd[p.id]=val; added = true; }
            document.getElementById(`s${p.id}`).value="";
        });
        if(added) { rounds.push(rd); saveData(); }
    }

    function undoRound() {
        if(rounds.length && confirm("Undo last round?")) {
            const rd=rounds.pop(); players.forEach(p=>{ if(rd[p.id]) p.total-=rd[p.id]; }); saveData();
        }
    }

    function completeMatch() {
        if(!players.length || !confirm("Archive and reset scores?")) return;
        const lim = parseInt(document.getElementById('pointLimit').value);
        const winList = players.filter(p => p.total < lim).map(p => p.name).join(', ') || "No Winner";
        const now = new Date();
        
        // Structured Entry for clean Daywise grouping
        const matchEntry = {
            date: now.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}),
            time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            winners: winList,
            summary: players.map(p => `${p.name}: ${p.total}`).join(' | ')
        };
        
        archive.push(matchEntry);
        rounds=[]; payouts=[]; players.forEach(p=>p.total=0); 
        saveData();
    }

    function addPlayer() { const n=prompt("Name:"); if(n) {players.push({id:Date.now(), name:n, total:0}); saveData();} }
    function removePlayer(id) { if(confirm("Remove?")) {players=players.filter(p=>p.id!==id); saveData();} }
    function addPayout() {
        const w=document.getElementById("winnerSelect").value;
        if(!selectedPayers.length) return alert("Select payers!");
        payouts.push({w, amt:selectedPayers.length*parseInt(document.getElementById("matchAmount").value), f:selectedPayers.join(', ')});
        selectedPayers=[]; saveData();
    }
    function logout() { if(confirm("Logout?")) {localStorage.clear(); location.reload();} }
    function saveData() {
        if(!window.dbRef) return;
        window.set(window.dbRef, {pin:localStorage.getItem("rummy_pin"), players, rounds, payouts, archive, limit:document.getElementById('pointLimit').value, amount:document.getElementById('matchAmount').value});
    }
</script>
</body>
</html>
